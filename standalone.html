/* ── INLINE DS COMPONENTS ───────────────────────────────────── */
function Badge({ children, tone='travel', solid=false, size='md' }) {
  const tones = { travel:{c:'var(--tag-travel)',bg:'var(--spice-50)'}, trek:{c:'var(--tag-trek)',bg:'var(--pine-50)'}, recipe:{c:'var(--tag-recipe)',bg:'var(--turmeric-50)'}, story:{c:'var(--tag-story)',bg:'var(--sky-100)'}, neutral:{c:'var(--espresso-600)',bg:'var(--paper-200)'} };
  const t = tones[tone]||tones.travel;
  return <span style={{ display:'inline-flex', alignItems:'center', gap:6, fontFamily:'var(--font-display)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.12em', lineHeight:1, borderRadius:'var(--radius-pill)', color:solid?'#fff':t.c, background:solid?t.c:t.bg, border:`1.5px solid ${solid?t.c:'transparent'}`, fontSize:size==='sm'?'10px':'11px', padding:size==='sm'?'3px 9px':'5px 12px' }}>{children}</span>;
}

function Avatar({ src, name='', size=44 }) {
  const initials = (name||'').split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
  return <span style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', width:size, height:size, borderRadius:'50%', overflow:'hidden', flexShrink:0, background:'var(--kraft-300)', color:'var(--espresso-700)', fontFamily:'var(--font-display)', fontWeight:600, fontSize:size*0.4, boxShadow:'0 0 0 2px var(--surface-card), 0 0 0 3.5px var(--espresso-700)' }}>
    {src ? <img src={src} alt={name} style={{width:'100%',height:'100%',objectFit:'cover'}} /> : initials}
  </span>;
}

    <div style={{ position:'relative', aspectRatio:'16/10', overflow:'hidden', background:'var(--paper-200)' }}>
      <img src={image} alt="" style={{ width:'100%', height:'100%', objectFit:'cover', transform:hover?'scale(1.06)':'scale(1)', transition:'transform 0.34s ease' }} />
      <span style={{ position:'absolute', top:12, left:12 }}><Badge tone={category} solid>{categoryLabel||category}</Badge></span>
    </div>
    <div style={{ padding:'18px 20px 20px', display:'flex', flexDirection:'column', gap:10, flex:1 }}>

      {excerpt && <p style={{ fontFamily:'var(--font-serif)', fontSize:'0.95rem', lineHeight:1.55, color:'var(--text-muted)', margin:0, display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden' }}>{excerpt}</p>}
      <div style={{ marginTop:'auto', paddingTop:10, display:'flex', alignItems:'center', gap:8, fontFamily:'var(--font-sans)', fontSize:12.5, color:'var(--text-faint)' }}>

        {author&&<span>·</span>}
        {date&&<span>{date}</span>}
        {readTime&&<span>·</span>}
        {readTime&&<span>{readTime}</span>}

}

function Header({route,nav}){
  const [scrolled,setScrolled]=React.useState(false);

    <section style={{...PS}}><div style={{...W,maxWidth:'48rem',textAlign:'center'}}>

/* ── APP / ROUTER ───────────────────────────────────────────── */
function parseHash(){const raw=window.location.hash.replace(/^#\/?/,'')||'home';const[base,slug]=raw.split('/');return{route:base||'home',slug};}
function App(){
  const[loc,setLoc]=React.useState(parseHash);
  const[key,setKey]=React.useState(0);
  React.useEffect(()=>{const fn=()=>{setLoc(parseHash());setKey(k=>k+1);window.scrollTo({top:0,behavior:'instant'});};window.addEventListener('hashchange',fn);return()=>window.removeEventListener('hashchange',fn);},[]);
  const nav=t=>{window.location.hash='#'+t;};
  const{route,slug}=loc;
  const pages={home:HomePage,blog:BlogPage,post:BlogPostPage,recipes:RecipesPage,recipe:RecipeDetailPage,about:AboutPage,book:BookPage};
  const Page=pages[route]||HomePage;
  return <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
    <Header route={route} nav={nav}/>
    <main style={{flex:1}}><div key={key} className="wf-page">{route==='post'||route==='recipe'?<Page slug={slug} nav={nav}/>:<Page nav={nav}/>}</div></main>
    <Footer nav={nav}/>
  </div>;
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>

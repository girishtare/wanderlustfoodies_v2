<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wanderlust Foodies</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: var(--surface-page); }
  #app { min-height: 100vh; display: flex; flex-direction: column; }
  #screen { flex: 1; }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="Header.jsx" data-presets="react"></script>
<script type="text/babel" src="Footer.jsx" data-presets="react"></script>
<script type="text/babel" src="HomePage.jsx" data-presets="react"></script>
<script type="text/babel" src="BlogPostPage.jsx" data-presets="react"></script>
<script type="text/babel" src="RecipePage.jsx" data-presets="react"></script>
<script type="text/babel" src="BookPage.jsx" data-presets="react"></script>
<script type="text/babel" data-presets="react">
  function App() {
    const [route, setRoute] = React.useState('home');
    const nav = (id) => { setRoute(id); window.scrollTo({ top: 0 }); };
    const screens = {
      home: window.HomePage,
      blog: window.BlogPostPage,
      recipe: window.RecipePage,
      book: window.BookPage,
    };
    const Screen = screens[route] || window.HomePage;
    return (
      <div id="app-inner">
        <window.Header active={route} onNav={nav} />
        <div id="screen"><Screen onNav={nav} /></div>
        <window.Footer onNav={nav} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>

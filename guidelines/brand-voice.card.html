<!-- @dsCard group="Brand" viewport="700x230" name="Voice & Tagline" subtitle="Warm, honest, first-person, food-obsessed" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;background:var(--surface-ink);padding:26px 28px;}
 .tagline{font-family:var(--font-display);font-weight:700;text-transform:uppercase;letter-spacing:.01em;font-size:34px;line-height:1;color:var(--paper-100);margin:0;}
 .accent{color:var(--turmeric-500);}
 .sub{font-family:var(--font-serif);font-style:italic;font-size:17px;color:var(--kraft-300);margin:14px 0 18px;}
 .chips{display:flex;gap:8px;flex-wrap:wrap;}
 .chip{font-family:var(--font-sans);font-size:12px;font-weight:600;color:var(--paper-100);border:1.5px solid var(--border-on-dark);border-radius:var(--radius-pill);padding:5px 13px;}
</style></head>
<body>
 <p class="tagline">Global Adventures.<br/><span class="accent">Local Flavours.</span></p>
 <p class="sub">“Exploring the world one bite at a time.”</p>
 <div class="chips">
  <span class="chip">Honest, not polished</span>
  <span class="chip">First person (“we”, “our”)</span>
  <span class="chip">Vivid &amp; sensory</span>
  <span class="chip">Self-deprecating wit</span>
  <span class="chip">Bold recipe call-outs</span>
 </div>
</body></html>

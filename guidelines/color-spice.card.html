<!-- @dsCard group="Colors" viewport="700x150" name="Spice — Primary Accent" subtitle="Terracotta for action & appetite" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;background:var(--surface-page);padding:20px;font-family:var(--font-sans);}
 .grid{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;border:1.5px solid var(--border-hairline);}
 .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:104px;padding:8px 10px;}
 .name{font-weight:600;font-size:11px;}
 .hex{font-size:10px;letter-spacing:.03em;opacity:.85;}
</style></head>
<body><div class="grid">
 <div class="sw" style="background:var(--spice-50);color:var(--espresso-700)"><div class="name">50</div><div class="hex">#F9E7DB</div></div>
 <div class="sw" style="background:var(--spice-200);color:var(--espresso-700)"><div class="name">200</div><div class="hex">#F0C7AC</div></div>
 <div class="sw" style="background:var(--spice-400);color:#fff"><div class="name">400</div><div class="hex">#D67843</div></div>
 <div class="sw" style="background:var(--spice-500);color:#fff"><div class="name">500 ★</div><div class="hex">#C2562A</div></div>
 <div class="sw" style="background:var(--spice-600);color:#fff"><div class="name">600</div><div class="hex">#B8481E</div></div>
 <div class="sw" style="background:var(--spice-700);color:#fff"><div class="name">700</div><div class="hex">#9A3D18</div></div>
</div></body></html>

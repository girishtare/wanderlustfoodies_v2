<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="Display, heading & text steps" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;background:var(--surface-page);padding:20px 24px;}
 .r{display:flex;align-items:baseline;gap:16px;padding:6px 0;border-bottom:1px solid var(--border-hairline);}
 .r:last-child{border-bottom:0;}
 .tok{font-family:var(--font-sans);font-size:11px;color:var(--text-faint);width:120px;flex-shrink:0;letter-spacing:.03em;}
 .ex{font-family:var(--font-display);font-weight:700;text-transform:uppercase;color:var(--text-strong);line-height:1.05;}
 .serif{font-family:var(--font-serif);font-weight:400;text-transform:none;color:var(--text-body);}
</style></head>
<body>
 <div class="r"><span class="tok">--text-h1 · 56px</span><span class="ex" style="font-size:40px">Onward & Upward</span></div>
 <div class="r"><span class="tok">--text-h2 · 40px</span><span class="ex" style="font-size:30px">Local Flavours</span></div>
 <div class="r"><span class="tok">--text-h3 · 24px</span><span class="ex" style="font-size:22px">The Trail Ahead</span></div>
 <div class="r"><span class="tok">--text-lead · 21px</span><span class="ex serif" style="font-size:21px">An honest travel memoir.</span></div>
 <div class="r"><span class="tok">--text-body · 17px</span><span class="ex serif" style="font-size:17px">Exploring the world one bite at a time.</span></div>
 <div class="r"><span class="tok">--text-xs · 13px</span><span class="ex serif" style="font-size:13px">Feb 9, 2025 · 26 min read</span></div>
</body></html>

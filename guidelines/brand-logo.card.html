<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;background:var(--surface-page);padding:22px;font-family:var(--font-sans);}
 .row{display:flex;gap:20px;align-items:stretch;}
 .panel{flex:1;border-radius:var(--radius-lg);border:1.5px solid var(--border-hairline);display:flex;align-items:center;justify-content:center;padding:18px;min-height:180px;}
 .ink{background:var(--surface-ink);border-color:var(--espresso-900);}
 .ink img{filter:brightness(0) saturate(100%) invert(96%) sepia(8%) saturate(420%) hue-rotate(350deg) brightness(103%);}
 img{height:150px;width:auto;}
 .cap{position:absolute;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin-top:-8px;}
</style></head>
<body><div class="row">
 <div class="panel" style="background:var(--paper-100)"><img src="../assets/logo/wanderlust-badge.png" alt="Wanderlust Foodies badge" /></div>
 <div class="panel" style="background:var(--paper-0)"><img src="../assets/logo/wanderlust-badge.png" alt="Wanderlust Foodies badge on white" /></div>
 <div class="panel ink"><img src="../assets/logo/wanderlust-badge.png" alt="Wanderlust Foodies badge reversed" /></div>
</div></body></html>

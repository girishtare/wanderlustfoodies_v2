<!-- @dsCard group="Colors" viewport="700x150" name="Brand Ink & Paper" subtitle="Espresso on warm cream — the core pairing" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;background:var(--surface-page);padding:20px;font-family:var(--font-sans);}
 .grid{display:flex;gap:14px;flex-wrap:wrap;}
 .sw{width:150px;border-radius:var(--radius-md);overflow:hidden;border:1.5px solid var(--border-hairline);}
 .chip{height:62px;}
 .meta{padding:8px 10px;background:var(--surface-card);}
 .name{font-weight:600;font-size:12.5px;color:var(--text-strong);}
 .hex{font-size:11px;color:var(--text-faint);letter-spacing:.04em;text-transform:uppercase;}
</style></head>
<body><div class="grid">
 <div class="sw"><div class="chip" style="background:var(--espresso-700)"></div><div class="meta"><div class="name">Espresso Ink</div><div class="hex">#382010 · --espresso-700</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--espresso-900)"></div><div class="meta"><div class="name">Deep Roast</div><div class="hex">#241405 · --espresso-900</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--paper-100)"></div><div class="meta"><div class="name">Warm Paper</div><div class="hex">#F7F1E5 · --paper-100</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--paper-50)"></div><div class="meta"><div class="name">Card</div><div class="hex">#FDFAF4 · --paper-50</div></div></div>
 <div class="sw"><div class="chip" style="background:var(--kraft-400)"></div><div class="meta"><div class="name">Kraft Border</div><div class="hex">#D2BE9C · --kraft-400</div></div></div>
</div></body></html>

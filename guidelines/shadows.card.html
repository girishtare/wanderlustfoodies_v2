<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;background:var(--surface-page);padding:26px 24px;font-family:var(--font-sans);}
 .row{display:flex;gap:26px;flex-wrap:wrap;}
 .item{display:flex;flex-direction:column;align-items:center;gap:12px;}
 .box{width:96px;height:62px;background:var(--surface-raised);border-radius:var(--radius-md);}
 .t{font-size:11px;color:var(--text-faint);}
</style></head>
<body><div class="row">
 <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="t">xs</div></div>
 <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="t">sm</div></div>
 <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="t">md</div></div>
 <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="t">lg</div></div>
</div></body></html>

<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>

 .item{display:flex;flex-direction:column;align-items:center;gap:7px;}
 .bar{background:var(--spice-500);border-radius:3px;width:22px;}
 .t{font-size:10.5px;color:var(--text-faint);}
</style></head>
<body><div class="row">

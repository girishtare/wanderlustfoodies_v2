<!-- @dsCard group="Colors" viewport="700x150" name="Trek Pine — Adventure" subtitle="Mountain green for trails & 'go'" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;background:var(--surface-page);padding:20px;font-family:var(--font-sans);}
 .grid{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;border:1.5px solid var(--border-hairline);}
 .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:104px;padding:8px 10px;}
 .name{font-weight:600;font-size:11px;}
 .hex{font-size:10px;letter-spacing:.03em;opacity:.85;}
</style></head>
<body><div class="grid">
 <div class="sw" style="background:var(--pine-50);color:var(--pine-800)"><div class="name">50</div><div class="hex">#EAF0E9</div></div>
 <div class="sw" style="background:var(--pine-100);color:var(--pine-800)"><div class="name">100</div><div class="hex">#DCE6DC</div></div>
 <div class="sw" style="background:var(--pine-300);color:#fff"><div class="name">300</div><div class="hex">#7E9A82</div></div>
 <div class="sw" style="background:var(--pine-500);color:#fff"><div class="name">500</div><div class="hex">#3C5A43</div></div>
 <div class="sw" style="background:var(--pine-700);color:#fff"><div class="name">700 ★</div><div class="hex">#2C4632</div></div>
 <div class="sw" style="background:var(--pine-800);color:#fff"><div class="name">800</div><div class="hex">#22382A</div></div>
</div></body></html>

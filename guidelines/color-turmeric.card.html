<!-- @dsCard group="Colors" viewport="700x150" name="Turmeric — Golden Highlight" subtitle="Warm gold for recipes, stars & accents" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;background:var(--surface-page);padding:20px;font-family:var(--font-sans);}
 .grid{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;border:1.5px solid var(--border-hairline);}
 .sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:104px;padding:8px 10px;}
 .name{font-weight:600;font-size:11px;}
 .hex{font-size:10px;letter-spacing:.03em;opacity:.85;}
</style></head>
<body><div class="grid">
 <div class="sw" style="background:var(--turmeric-50);color:var(--espresso-700)"><div class="name">50</div><div class="hex">#FBF3DA</div></div>
 <div class="sw" style="background:var(--turmeric-100);color:var(--espresso-700)"><div class="name">100</div><div class="hex">#F6E6BC</div></div>
 <div class="sw" style="background:var(--turmeric-300);color:var(--espresso-700)"><div class="name">300</div><div class="hex">#F0CB6B</div></div>
 <div class="sw" style="background:var(--turmeric-500);color:var(--espresso-900)"><div class="name">500 ★</div><div class="hex">#E0A21A</div></div>
 <div class="sw" style="background:var(--turmeric-600);color:#fff"><div class="name">600</div><div class="hex">#C98A0E</div></div>
</div></body></html>

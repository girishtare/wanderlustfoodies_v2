<!-- @dsCard group="Type" viewport="700x180" name="UI — Hanken Grotesk" subtitle="Clean humanist sans for labels, meta & forms" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;background:var(--surface-page);padding:22px 24px;font-family:var(--font-sans);}
 .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);margin-bottom:14px;}
 .row{display:flex;gap:30px;flex-wrap:wrap;align-items:baseline;}
 .lbl{font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--text-muted);}
 .ui{font-size:15px;color:var(--text-body);font-weight:500;}
 .meta{font-size:13px;color:var(--text-faint);}
 .w{display:flex;flex-direction:column;gap:5px;}
</style></head>
<body>
 <div class="eyebrow">UI · Hanken Grotesk 400–700</div>
 <div class="row">
  <div class="w"><span class="lbl">Label / Overline</span><span class="ui">Trekking · Garhwal Himalayas</span></div>
  <div class="w"><span class="lbl">Body / Form</span><span class="ui">Subscribe for weekly stories</span></div>
  <div class="w"><span class="lbl">Meta</span><span class="meta">Feb 9, 2025 · 26 min read</span></div>
 </div>
</body></html>

<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
 body{margin:0;background:var(--surface-page);padding:22px 24px;}
 .eyebrow{font-family:var(--font-sans);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;}
 .d1{font-family:var(--font-display);font-weight:700;text-transform:uppercase;letter-spacing:.01em;line-height:.95;color:var(--text-strong);font-size:64px;margin:0;}
 .d2{font-family:var(--font-display);font-weight:600;text-transform:uppercase;letter-spacing:.02em;color:var(--accent-primary);font-size:30px;margin:10px 0 0;}
 .spec{font-family:var(--font-sans);font-size:11.5px;color:var(--text-faint);margin-top:10px;}
</style></head>
<body>
 <div class="eyebrow">Display · Oswald 600–700</div>
 <h1 class="d1">GLOBAL ADVENTURES</h1>
 <div class="d2">Local Flavours · 700 / 600 / 500</div>
 <div class="spec">Use UPPERCASE with tight leading for hero titles, section heads & buttons. Tracking 0.01–0.06em.</div>
</body></html>

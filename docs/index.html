<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wanderlust Foodies — Global Adventures. Local Flavours.</title>
<meta name="description" content="Honest travel tales, hard-won trails and home-cooked recipes from every journey." />
<link rel="stylesheet" href="../styles.css" />
<style>
  html { scroll-behavior: smooth; }

</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<script src="data.js"></script>
<script type="text/babel" data-presets="react">
const { Badge, Stat, ArticleCard, RecipeCard, Avatar, StampSeal, Button, Input } = window.WanderlustFoodiesDesignSystem_288b64;
const imgs = '../assets/img/';
const logo = '../assets/logo/wanderlust-badge.png';

/* ── SHARED HELPERS ─────────────────────────────────────────── */
const Eyebrow = ({children, light}) => (
  <span style={{ fontFamily:'var(--font-sans)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.18em', fontSize:11, color: light ? 'var(--turmeric-300)' : 'var(--spice-500)', display:'block', marginBottom:10 }}>{children}</span>
);
const H2 = ({children, light, mb=24}) => (
  <h2 style={{ fontFamily:'var(--font-display)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.01em', fontSize:'clamp(1.9rem,3.2vw,2.8rem)', color: light ? 'var(--paper-100)' : 'var(--text-strong)', lineHeight:1.0, margin:`0 0 ${mb}px` }}>{children}</h2>
);
const Btn = ({children, variant='primary', onClick, style={}}) => {
  const v = {
    primary: { background:'var(--spice-500)', color:'#fff', border:'none' },
    dark: { background:'transparent', color:'var(--kraft-300)', border:'2px solid var(--kraft-400)' },
    outline: { background:'transparent', color:'var(--espresso-700)', border:'2px solid var(--espresso-700)' },
    ghost: { background:'transparent', color:'var(--spice-600)', border:'none' },
    gold: { background:'var(--turmeric-500)', color:'var(--espresso-900)', border:'none' },
  };
  return <button onClick={onClick} style={{ fontFamily:'var(--font-display)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.07em', fontSize:13, padding:'12px 24px', borderRadius:'var(--radius-pill)', cursor:'pointer', transition:'filter var(--dur-fast)', ...v[variant], ...style }}
    onMouseEnter={e=>e.currentTarget.style.filter='brightness(1.1)'} onMouseLeave={e=>e.currentTarget.style.filter='none'}>{children}</button>;
};
const prose = { fontFamily:'var(--font-serif)', fontSize:'clamp(1.05rem,1.5vw,1.18rem)', lineHeight:1.8, color:'var(--text-body)', margin:'0 0 1.2em' };
const W = { maxWidth:'78rem', margin:'0 auto', padding:'0 clamp(1.25rem,4vw,2.5rem)' };
const PadSec = { padding:'clamp(3rem,6vw,5rem) 0' };

/* ── HEADER ─────────────────────────────────────────────────── */
function Header({ route, nav }) {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 50);
    window.addEventListener('scroll', fn, { passive:true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  const isHero = route === 'home';
  const light = isHero && !scrolled;
  const links = [['home','Home'],['blog','Blogs'],['recipes','Recipes'],['about','About'],['book','The Book']];
  return (
    <header style={{ position:'fixed', top:0, left:0, right:0, zIndex:200, background: scrolled ? 'rgba(247,241,229,0.94)' : isHero ? 'transparent' : 'var(--surface-page)', backdropFilter: scrolled ? 'blur(14px)' : 'none', borderBottom: scrolled ? '1.5px solid var(--border-hairline)' : '1.5px solid transparent', transition:'all 0.28s ease' }}>
      <div style={{ ...W, height:68, display:'flex', alignItems:'center' }}>
        <a href="#home" onClick={e=>{e.preventDefault();nav('home');}} style={{ display:'flex', alignItems:'center', gap:10, textDecoration:'none', flexShrink:0 }}>
          <img src={logo} alt="Wanderlust Foodies" style={{ height:42, width:'auto' }} />
          <div style={{ lineHeight:1 }}>
            <div style={{ fontFamily:'var(--font-display)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.03em', fontSize:17, color: light ? '#fff' : 'var(--espresso-700)' }}>Wanderlust</div>
            <div style={{ fontFamily:'var(--font-display)', fontWeight:500, fontSize:10, letterSpacing:'0.22em', textTransform:'uppercase', color: light ? 'rgba(255,255,255,0.7)' : 'var(--spice-600)', marginTop:2 }}>Foodies</div>
          </div>
        </a>
        <nav style={{ marginLeft:'auto', display:'flex', gap:2, alignItems:'center' }}>
          {links.map(([id,label]) => (
            <a key={id} href={'#'+id} onClick={e=>{e.preventDefault();nav(id);}} style={{ fontFamily:'var(--font-display)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.07em', fontSize:12.5, textDecoration:'none', padding:'8px 13px', borderRadius:'var(--radius-pill)', transition:'background 0.12s, color 0.12s', color: route===id ? 'var(--spice-600)' : light ? 'rgba(255,255,255,0.88)' : 'var(--espresso-600)', background: route===id ? 'var(--spice-50)' : 'transparent' }}
              onMouseEnter={e=>{ if(route!==id) e.currentTarget.style.background = light ? 'rgba(255,255,255,0.12)' : 'var(--paper-200)'; }}
              onMouseLeave={e=>{ if(route!==id) e.currentTarget.style.background='transparent'; }}
            >{label}</a>
          ))}
          <button onClick={()=>nav('about')} style={{ marginLeft:8, fontFamily:'var(--font-display)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', fontSize:11.5, padding:'9px 18px', borderRadius:'var(--radius-pill)', border:'none', cursor:'pointer', background:'var(--spice-500)', color:'#fff' }}>Subscribe</button>
        </nav>
      </div>
    </header>
  );
}

/* ── FOOTER ─────────────────────────────────────────────────── */
function Footer({ nav }) {
  const socials = ['Facebook','Instagram','Threads','X','YouTube','WhatsApp'];
  return (
    <footer style={{ background:'var(--espresso-900)', color:'var(--kraft-300)' }}>
      <div style={{ ...W, padding:'clamp(3rem,6vw,4.5rem) clamp(1.25rem,4vw,2.5rem) clamp(2rem,4vw,3rem)', display:'grid', gridTemplateColumns:'1.5fr 1fr 0.8fr 1fr', gap:'clamp(1.5rem,4vw,3rem)' }}>
        <div>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
            <img src={logo} alt="" style={{ height:40, width:'auto', filter:'brightness(0) invert(1) opacity(0.7)' }} />
            <span style={{ fontFamily:'var(--font-display)', fontWeight:700, textTransform:'uppercase', fontSize:17, color:'var(--paper-100)', letterSpacing:'0.03em' }}>Wanderlust Foodies</span>
          </div>
          <p style={{ fontFamily:'var(--font-serif)', fontSize:14.5, lineHeight:1.65, maxWidth:'32ch', margin:'0 0 18px' }}>Exploring the world one bite at a time. Global Adventures. Local Flavours.</p>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {socials.map(s => <span key={s} style={{ fontFamily:'var(--font-sans)', fontSize:10.5, fontWeight:600, color:'var(--kraft-400)', border:'1.5px solid rgba(210,190,156,0.22)', borderRadius:'var(--radius-pill)', padding:'4px 10px' }}>{s}</span>)}
          </div>
        </div>
        <div>
          <div style={{ fontFamily:'var(--font-sans)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.14em', fontSize:11, color:'var(--turmeric-300)', marginBottom:14 }}>Explore</div>
          <ul style={{ listStyle:'none', padding:0, margin:0, display:'flex', flexDirection:'column', gap:10 }}>
            {[['home','Home'],['blog','Blogs'],['recipes','Recipes'],['about','About'],['book','The Book']].map(([id,l]) => (
              <li key={id}><a href={'#'+id} onClick={e=>{e.preventDefault();nav(id);}} style={{ fontFamily:'var(--font-sans)', fontSize:14.5, color:'var(--kraft-300)', textDecoration:'none' }} onMouseEnter={e=>e.currentTarget.style.color='var(--paper-0)'} onMouseLeave={e=>e.currentTarget.style.color='var(--kraft-300)'}>{l}</a></li>
            ))}
          </ul>
        </div>
        <div>
          <div style={{ fontFamily:'var(--font-sans)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.14em', fontSize:11, color:'var(--turmeric-300)', marginBottom:14 }}>Links</div>
          <ul style={{ listStyle:'none', padding:0, margin:0, display:'flex', flexDirection:'column', gap:10 }}>
            {['Privacy Policy','Contact','Subscribe'].map(l => <li key={l}><a href="#" onClick={e=>e.preventDefault()} style={{ fontFamily:'var(--font-sans)', fontSize:14.5, color:'var(--kraft-300)', textDecoration:'none' }}>{l}</a></li>)}
          </ul>
        </div>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-start', gap:16 }}>
          <StampSeal size={88} color="var(--kraft-400)" />
          <p style={{ fontFamily:'var(--font-serif)', fontStyle:'italic', fontSize:14, lineHeight:1.55, margin:0, color:'var(--kraft-400)' }}>"Exploring the world one bite at a time."</p>
        </div>
      </div>
      <div style={{ borderTop:'1px solid rgba(210,190,156,0.1)', textAlign:'center', padding:'16px', fontFamily:'var(--font-serif)', fontStyle:'italic', fontSize:13, color:'var(--espresso-400)' }}>
        © 2025 Wanderlust Foodies — Made with love. Where travel meets taste.
      </div>
    </footer>
  );
}

/* ── HOME PAGE ──────────────────────────────────────────────── */
function HomePage({ nav }) {
  const { posts, recipes } = window.WF_DATA;
  const featured = posts.filter(p => p.featured).slice(0, 3);
  const featuredRec = recipes.filter(r => r.featured).slice(0, 3);
  const [email, setEmail] = React.useState('');
  const [subbed, setSubbed] = React.useState(false);
  return (
    <div>
      {/* HERO */}
      <section style={{ position:'relative', height:'100vh', minHeight:600, overflow:'hidden', display:'flex', alignItems:'center', paddingTop:68, background:'var(--espresso-900)' }}>
        <img src={imgs+'trek-sandakphu.jpg'} alt="" style={{ position:'absolute', top:0, left:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'center 30%' }} />
        <div style={{ position:'absolute', top:0, left:0, width:'100%', height:'100%', background:'linear-gradient(160deg,rgba(36,20,5,0.2) 0%,rgba(36,20,5,0.78) 60%,rgba(36,20,5,0.96) 100%)' }} />
        <div style={{ position:'relative', zIndex:2, ...W, display:'grid', gridTemplateColumns:'1fr auto', gap:48, alignItems:'center', width:'100%' }}>
          <div>
            <Eyebrow light>Travel · Food · Stories</Eyebrow>
            <h1 style={{ fontFamily:'var(--font-display)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.005em', lineHeight:0.94, fontSize:'clamp(3rem,7vw,6rem)', color:'var(--paper-50)', margin:'0 0 20px', textWrap:'balance' }}>
              Global<br/>Adventures.<br/><span style={{ color:'var(--spice-400)' }}>Local Flavours.</span>
            </h1>
            <p style={{ fontFamily:'var(--font-serif)', fontStyle:'italic', fontSize:'clamp(1.1rem,1.7vw,1.35rem)', lineHeight:1.55, color:'rgba(239,230,211,0.88)', maxWidth:'44ch', margin:'0 0 32px' }}>
              Honest travel tales, hard-won trails and the home-cooked recipes we carry back from every journey.
            </p>
            <div style={{ display:'flex', gap:12, flexWrap:'wrap' }}>
              <Btn onClick={()=>nav('blog')}>Travel Stories</Btn>
              <button onClick={()=>nav('recipes')} style={{ fontFamily:'var(--font-display)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.07em', fontSize:13, padding:'12px 24px', borderRadius:'var(--radius-pill)', border:'2px solid rgba(239,230,211,0.45)', cursor:'pointer', background:'transparent', color:'var(--paper-100)' }} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--paper-100)';e.currentTarget.style.background='rgba(255,255,255,0.1)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(239,230,211,0.45)';e.currentTarget.style.background='transparent';}}>Explore Recipes</button>
            </div>
          </div>
          <div style={{ opacity:0.1, flexShrink:0 }}>
            <img src={logo} alt="" style={{ width:240, filter:'brightness(10)' }} />
          </div>
        </div>
        <div style={{ position:'absolute', bottom:32, left:'50%', transform:'translateX(-50%)', display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
          <span style={{ fontFamily:'var(--font-sans)', fontSize:9, letterSpacing:'0.2em', textTransform:'uppercase', color:'rgba(255,255,255,0.4)' }}>Scroll</span>
          <div style={{ width:1, height:38, background:'rgba(255,255,255,0.22)' }} />
        </div>
      </section>

      {/* CATEGORY STRIP */}
      <div style={{ background:'var(--surface-card)', borderBottom:'1.5px solid var(--border-hairline)' }}>
        <div style={{ ...W, height:52, display:'flex', alignItems:'center', gap:8 }}>
          {[['blog','✈ Travel'],['blog','▲ Trek'],['recipes','★ Recipes'],['blog','♥ Story']].map(([to,l],i) => (
            <button key={i} onClick={()=>nav(to)} style={{ fontFamily:'var(--font-display)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.1em', fontSize:12.5, padding:'6px 15px', borderRadius:'var(--radius-pill)', border:'1.5px solid var(--border-hairline)', background:'transparent', color:'var(--text-muted)', cursor:'pointer', transition:'all 0.12s' }} onMouseEnter={e=>{e.currentTarget.style.background='var(--spice-50)';e.currentTarget.style.color='var(--spice-600)';e.currentTarget.style.borderColor='var(--spice-200)';}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--text-muted)';e.currentTarget.style.borderColor='var(--border-hairline)';}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* TRAVEL TALES */}
      <section style={{ ...PadSec }}>
        <div style={W}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:28, flexWrap:'wrap', gap:16 }}>
            <div><Eyebrow>Travel Tales</Eyebrow><H2 mb={0}>Discover the World Through Our Stories</H2></div>
            <Btn variant="ghost" onClick={()=>nav('blog')}>View All Stories →</Btn>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:22 }}>
            {featured.map(p => <ArticleCard key={p.slug} image={p.image} category={p.category} categoryLabel={p.categoryLabel} title={p.title} excerpt={p.excerpt} author={p.author} date={p.date} readTime={p.readTime} onClick={e=>{e.preventDefault();nav('post/'+p.slug);}} href="#" />)}
          </div>
        </div>
      </section>

      {/* RECIPES (dark band) */}
      <section style={{ background:'var(--espresso-800)', ...PadSec }}>
        <div style={{ ...W, display:'grid', gridTemplateColumns:'1fr 1.4fr', gap:'clamp(2rem,5vw,4rem)', alignItems:'center' }}>
          <div>
            <Eyebrow light>From Our Kitchen</Eyebrow>
            <H2 light mb={14}>Join Us on a Flavourful Journey</H2>
            <p style={{ fontFamily:'var(--font-serif)', fontSize:17, lineHeight:1.7, color:'var(--kraft-300)', marginBottom:24, maxWidth:'38ch' }}>Recipes from the kitchens we've cooked in and the markets we've wandered through.</p>
            <Btn variant="dark" onClick={()=>nav('recipes')}>All Recipes →</Btn>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
            {featuredRec.map(r => <RecipeCard key={r.slug} image={r.image} title={r.title} time={r.time} tags={r.tags} blurb={r.blurb} onClick={e=>{e.preventDefault();nav('recipe/'+r.slug);}} href="#" style={{ background:'rgba(78,50,28,0.4)', borderColor:'rgba(210,190,156,0.15)' }} />)}
          </div>
        </div>
      </section>

      {/* MEET */}
      <section style={{ ...PadSec }}>
        <div style={{ ...W, display:'grid', gridTemplateColumns:'1fr 1fr', gap:'clamp(2rem,5vw,4rem)', alignItems:'center' }}>
          <div style={{ position:'relative' }}>
            <div style={{ borderRadius:'var(--radius-xl)', overflow:'hidden', border:'2.5px solid var(--espresso-700)', boxShadow:'var(--shadow-lg)', transform:'rotate(-1.2deg)' }}>
              <img src={imgs+'couple-illustration.jpg'} alt="Girish & Vidya" style={{ width:'100%', aspectRatio:'1', objectFit:'cover', display:'block' }} />

            <div style={{ display:'flex', gap:'clamp(1.5rem,4vw,3rem)', flexWrap:'wrap', marginTop:24 }}>

                <div key={l}><div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:'2.6rem', lineHeight:1, color:'var(--spice-500)' }}>{v}</div><div style={{ fontFamily:'var(--font-sans)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.1em', fontSize:11, color:'var(--text-muted)', marginTop:5 }}>{l}</div></div>
              ))}
            </div>
          </div>
        </div>
      </section>

      {/* NEWSLETTER */}
      <section style={{ background:'var(--pine-800)', ...PadSec }}>
        <div style={{ ...W, maxWidth:'54rem', textAlign:'center' }}>
          <Eyebrow light>Stay in the Loop</Eyebrow>
          <H2 light>Join the Adventure</H2>
          <p style={{ fontFamily:'var(--font-serif)', fontSize:18, lineHeight:1.6, color:'var(--pine-300)', marginBottom:28 }}>Subscribe for weekly stories, seasonal recipes and insider tips. No spam, only stories.</p>
          {subbed ? <p style={{ fontFamily:'var(--font-serif)', fontStyle:'italic', fontSize:20, color:'var(--turmeric-300)' }}>You're on the trail with us — see you Sunday.</p> : (

              <Btn variant="gold" onClick={()=>{ if(email) setSubbed(true); }}>Subscribe</Btn>
            </div>
          )}
        </div>
      </section>
    </div>
  );
}

/* ── ABOUT PAGE ─────────────────────────────────────────────── */
function AboutPage({ nav }) {
  return (
    <div style={{ paddingTop:68 }}>
      <div style={{ background:'var(--espresso-900)', ...PadSec }}>
        <div style={{ ...W, textAlign:'center' }}>
          <Eyebrow light>Our Story</Eyebrow>
          <h1 style={{ fontFamily:'var(--font-display)', fontWeight:700, textTransform:'uppercase', fontSize:'clamp(2.8rem,6vw,5rem)', color:'var(--paper-100)', lineHeight:0.96, margin:0 }}>About Us</h1>
        </div>
      </div>
      <section style={{ ...PadSec }}>
        <div style={{ ...W, display:'grid', gridTemplateColumns:'1fr 1fr', gap:'clamp(2.5rem,6vw,5rem)', alignItems:'start' }}>

            <div style={{ borderRadius:'var(--radius-xl)', overflow:'hidden', border:'2.5px solid var(--espresso-700)', boxShadow:'var(--shadow-lg)' }}>
              <img src={imgs+'couple-illustration.jpg'} alt="Girish and Vidya" style={{ width:'100%', display:'block' }} />
            </div>
          </div>
          <div>
            <H2>Welcome to Wanderlust Foodies</H2>
            <p style={prose}>We are Girish and Vidya — and our son Devansh, who has been dragged along on enough road trips to have opinions about all of them. Wanderlust Foodies is where we document those adventures: honestly, with photographs taken by whoever isn't complaining about the altitude.</p>
            <p style={prose}>We believe the best way to understand a culture is through its cuisine. A temple tells you what people revere. A kitchen tells you how they live.</p>
            <blockquote style={{ margin:'24px 0', padding:'4px 0 4px 22px', borderLeft:'4px solid var(--spice-500)' }}>
              <p style={{ fontFamily:'var(--font-serif)', fontStyle:'italic', fontSize:'clamp(1.2rem,2vw,1.5rem)', lineHeight:1.4, color:'var(--espresso-700)', margin:0 }}>"Exploring the world one bite at a time."</p>
            </blockquote>
            <p style={prose}>Girish recently wrote <em>The Human Migration</em> — a memoir about trekking the Garhwal Himalayas that is more honest about what it feels like to be deeply unprepared than most travel writing allows. Vidya handles the recipes. Devansh handles the complaints.</p>
            <div style={{ display:'flex', gap:12, marginTop:8 }}>
              <Btn onClick={()=>nav('blog')}>Read Our Stories</Btn>
              <Btn variant="outline" onClick={()=>nav('book')}>The Book →</Btn>
            </div>
          </div>
        </div>
      </section>
      <div style={{ background:'var(--surface-sunk)', borderTop:'1.5px solid var(--border-hairline)', borderBottom:'1.5px solid var(--border-hairline)', padding:'clamp(2rem,4vw,3rem) 0' }}>
        <div style={{ ...W, display:'flex', justifyContent:'center', gap:'clamp(2.5rem,7vw,6rem)', flexWrap:'wrap' }}>
          {[['25+','Destinations explored'],['50+','Recipes documented'],['3','Active travellers'],['2025','Memoir published']].map(([v,l]) => (

/* ── APP / ROUTER ───────────────────────────────────────────── */
function parseHash() {
  const raw = window.location.hash.replace(/^#\/?/, '') || 'home';
  const [base, slug] = raw.split('/');
  return { route: base || 'home', slug };
}
function App() {
  const [loc, setLoc] = React.useState(parseHash);
  const [key, setKey] = React.useState(0);
  React.useEffect(() => {
    const fn = () => { setLoc(parseHash()); setKey(k=>k+1); window.scrollTo({top:0,behavior:'instant'}); };
    window.addEventListener('hashchange', fn);
    return () => window.removeEventListener('hashchange', fn);
  }, []);
  const nav = t => { window.location.hash = '#' + t; };
  const { route, slug } = loc;
  const pages = { home:HomePage, blog:BlogPage, post:BlogPostPage, recipes:RecipesPage, recipe:RecipeDetailPage, about:AboutPage, book:BookPage };
  const Page = pages[route] || HomePage;
  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>
      <Header route={route} nav={nav} />
      <main style={{ flex:1 }}>
        <div key={key} className="wf-page">
          {route==='post'||route==='recipe' ? <Page slug={slug} nav={nav} /> : <Page nav={nav} />}
        </div>
      </main>
      <Footer nav={nav} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
